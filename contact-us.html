<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreciseEdu - Contact</title>
    <link rel="stylesheet" href="styles/site.css" type="text/css">
    <script type=module src="main.js"></script>
    <script type=module src="hamburger.js"></script>
    <link rel="icon" type="image/x-icon" href="images/icon-clear.png">
</head>

<body>
    <header class="sectionMargin">
        <nav>
            <a href="index.html" class="logoContainer">
                <img class="logo"
                    alt="PreciseEdu company logo showing a student wearing a graduation cap. Slogan: Learn Right"
                    src="images/logo.svg">
            </a>
            <div class="mobileNavIconContainer">
                <img src="images/Hamburger.svg"
                    alt="hamburger menu for people to click in order to show the navigation">
            </div>
            <div class="navigationContainer">
                <img class="exitButton" src="images/x.png" alt="button to close the div">
                <ul>
                    <li><a href="index.html" class="navLink">Home</a></li>
                    <li><a href="about-us.html" class="navLink">About Us</a></li>
                    <li><a href="contact-us.html" class="navLink">Contact</a></li>
                    <li><a href="#" class="navLink">Resources</a></li>
                    <li><a href="#" class="navLink">Hours</a></li>
                    <li><a href="pricing.html" class="navLink">Pricing</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="sectionMargin">
            <h1 class="sectionHeading">Need to get in touch?</h1>
            <form action="contact-us.html" method="get">
                <label for="fname">First Name:</label>
                <input type="text" name="fname" id="fname">
                <label for="lname">Last Name:</label>
                <input type="text" name="lname" id="lname">
                <label for="email">Email Address:</label>
                <input type="email" name="email" id="email">
                <label for="how">Question Topic</label>
                <select name="how" id="how">
                    <option value="-1">-- Select Option --</option>
                    <option value="technical">Technical Issue</option>
                    <option value="pricing">Pricing</option>
                    <option value="signup">Signup Process</option>
                </select>
                <fieldset id="radioset">
                    <legend>How did you hear about us?</legend>
                    <div class="radioContainer"><input type="radio" name="social" id="facebook"><label
                            for="facebook">Facebook</label></div>
                    <div class="radioContainer">
                        <input type="radio" name="social" id="instagram"><label for="instagram">Instagram</label>
                    </div>
                    <div class="radioContainer"><input type="radio" name="social" id="youtube"><label
                            for="youtube">YouTube</label></div>
                </fieldset>
                <fieldset id="select">
                    <legend>What service is this regarding?</legend>
                    <div><input type="checkbox" name="Tutoring" id="Tutoring"><label for="Tutoring">Tutoring</label></div>
                    <div><input type="checkbox" name="feedback" id="feedback"><label for="feedback">Feedback</label></div>
                    <div><input type="checkbox" name="archive" id="archive"><label for="archive">Archive</label></div>
                </fieldset>
                <label for="comment">Comment:</label>
                <textarea name="comment" id="comment"></textarea>
                <input type="submit" value="Send">
            </form>
        </section>
    </main>
    <footer>
        <div class="footerInfoContainer">
            <img class="logo"
                alt="PreciseEdu company logo showing a student wearing a graduation cap. Slogan: Learn Right"
                src="images/logo.svg">
            <div class="iconContainer">
                <img src="images/twitter.svg" alt="">
                <img src="images/facebook.svg" alt="">
                <img src="images/instagram.svg" alt="">
            </div>
        </div>
        <div class="footerColumnContainer">
            <div>
                <p><a href="index.html">Home</a></p>
                <p><a href="#">Resources</a></p>
                <p><a href="pricing.html">Pricing</a></p>
            </div>
            <div>
                <p><a href="contact-us.html">Contact</a></p>
                <p><a href="about-us.html">About Us</a></p>
                <p><a href="#">Hours</a></p>
            </div>
        </div>
    </footer>
</body>

</html>
